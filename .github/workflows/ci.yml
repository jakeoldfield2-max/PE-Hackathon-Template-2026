name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests with coverage (min 70%)
        run: |
          uv run pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t urlpulse:ci .

      - name: Smoke test image can serve /health
        run: |
          container_id=$(docker run -d -p 5000:5000 urlpulse:ci)
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT

          echo "Waiting for container to start..."
          sleep 5

          echo "Container logs:"
          docker logs "$container_id" 2>&1 | tee /tmp/container.log

          echo ""
          echo "Testing /health endpoint..."
          curl --fail --retry 10 --retry-delay 2 --retry-connrefused http://127.0.0.1:5000/health || {
            echo "Health check failed!"
            exit 1
          }

          echo ""
          echo "Checking for errors in logs..."
          if grep -q '"level": "ERROR"' /tmp/container.log; then
            echo "ERROR: Found ERROR level logs - failing build"
            grep '"level": "ERROR"' /tmp/container.log
            exit 1
          fi
          echo "No errors found in logs."

  deploy:
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_KEY" ]; then
            echo "Deploy secrets not configured — skipping deploy."
            echo "Set DEPLOY_HOST, DEPLOY_USER, and DEPLOY_KEY in GitHub Secrets."
            exit 0
          fi
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh
