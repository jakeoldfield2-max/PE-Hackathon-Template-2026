name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests with coverage (min 70%)
        run: |
          uv run pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t urlpulse:ci .

      - name: Smoke test image can boot Flask app
        run: |
          docker run --rm \
            urlpulse:ci \
            uv run python -c "from run import app; print(app.url_map)"

  deploy:
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Validate GitHub Actions context
        run: |
          test -n "${{ github.repository }}"
          test -n "${{ github.ref }}"

      - name: Deploy placeholder
        run: echo "Deploy would run here (blocked unless test and docker-build pass)."
