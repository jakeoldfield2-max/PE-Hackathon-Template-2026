global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "urlpulse"
    metrics_path: /metrics
    static_configs:
      - targets: ["app-1:5000", "app-2:5000", "app-3:5000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
