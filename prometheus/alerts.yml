groups:
  - name: urlpulse-alerts
    rules:
      - alert: ServiceDown
        expr: up{job="urlpulse"} == 0
        for: 15s
        labels:
          severity: critical
          service: urlpulse
        annotations:
          summary: "URLPulse instance down"
          description: "Instance {{ $labels.instance }} is unreachable."
          impact: "Reduced capacity. Traffic shifted to remaining instances."
          runbook: "docs/runbooks/SERVICE_DOWN.md"
          action: "1. Check logs: docker compose logs {{ $labels.instance | reReplaceAll \":.*\" \"\" }} --tail 50  2. Restart: docker compose restart {{ $labels.instance | reReplaceAll \":.*\" \"\" }}"

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[2m]))
          /
          sum(rate(http_requests_total[2m])) > 0.05
        for: 2m
        labels:
          severity: warning
          service: urlpulse
        annotations:
          summary: "High 5xx error rate"
          description: "5xx error rate is {{ $value | humanizePercentage }} (threshold: 5%)."
          impact: "Users experiencing failed requests. SLA at risk."
          runbook: "docs/runbooks/HIGH_ERROR_RATE.md"
          action: "1. Check logs for exceptions  2. Verify database: curl http://localhost/ready  3. Check recent deployments"

      - alert: HighLatency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket[2m])) by (le)
          ) > 2
        for: 2m
        labels:
          severity: warning
          service: urlpulse
        annotations:
          summary: "High p95 latency"
          description: "p95 latency is {{ $value | humanizeDuration }} (threshold: 2s)."
          impact: "Slow user experience. Risk of timeouts."
          runbook: "docs/runbooks/HIGH_LATENCY.md"
          action: "1. Check traffic spike in Grafana  2. Check database queries  3. Verify Redis cache"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes > 500000000
        for: 2m
        labels:
          severity: warning
          service: urlpulse
        annotations:
          summary: "High process memory usage"
          description: "Instance {{ $labels.instance }} memory is {{ $value | humanize1024 }}B (threshold: 500MB)."
          impact: "Risk of OOM crash. May affect performance."
          runbook: "docs/runbooks/HIGH_MEMORY_USAGE.md"
          action: "1. Check docker stats  2. Restart container: docker compose restart {{ $labels.instance | reReplaceAll \":.*\" \"\" }}  3. Monitor for memory leak"
