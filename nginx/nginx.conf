# WHY Nginx round-robin: Distributes requests evenly across 3 app instances.
# Chosen over HAProxy for simplicity (DECISIONS.md #2).
# Gzip reduces response size for API payloads — improves latency under load.

events {
    worker_connections 1024;
}

http {
    # --- Upstream: 3 Flask/Gunicorn instances ---
    upstream urlpulse {
        server app-1:5000;
        server app-2:5000;
        server app-3:5000;
        keepalive 32;
    }

    # --- Gzip compression ---
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    server {
        listen 80;
        server_name _;

        # Pass real client IP to app instances
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass http://urlpulse;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeouts matching Gunicorn's 30s timeout
            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # Health check for Nginx itself
        location /nginx-health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
