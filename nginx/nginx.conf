# WHY Nginx round-robin: Distributes requests evenly across 3 app instances.
# Chosen over HAProxy for simplicity (DECISIONS.md #2).
# Gzip reduces response size for API payloads — improves latency under load.

events {
    worker_connections 1024;
}

http {
    # --- Upstream: 3 Flask/Gunicorn instances ---
    upstream urlpulse {
        server app-1:5000;
        server app-2:5000;
        server app-3:5000;
        keepalive 32;
    }

    # --- Gzip compression ---
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # --- Upstream: Streamlit UI ---
    upstream streamlit {
        server ui:8501;
    }

    server {
        listen 80;
        server_name _;

        # Pass real client IP to app instances
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- API endpoints → Flask backend ---
        location /health    { proxy_pass http://urlpulse; }
        location /ready     { proxy_pass http://urlpulse; }
        location /metrics   { proxy_pass http://urlpulse; }
        location /stats     { proxy_pass http://urlpulse; }
        location /seed      { proxy_pass http://urlpulse; }
        location /users     { proxy_pass http://urlpulse; }
        location /shorten   { proxy_pass http://urlpulse; }
        location /update    { proxy_pass http://urlpulse; }
        location /delete    { proxy_pass http://urlpulse; }
        location /chaos     { proxy_pass http://urlpulse; }
        location /s/        { proxy_pass http://urlpulse; }

        # --- Streamlit UI → frontend ---
        location / {
            proxy_pass http://streamlit;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        location /_stcore {
            proxy_pass http://streamlit;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # Health check for Nginx itself
        location /nginx-health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
