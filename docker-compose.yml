# WHY 3 app instances: Scalability Gold requires surviving 1 instance kill
# while 2 continue serving. restart:always provides auto-recovery.
# WHY Nginx: Round-robin load balancing across instances (docs/DECISIONS.md #2).
# WHY Redis maxmemory-policy allkeys-lru: Prevents OOM crash by evicting
# least-recently-used keys (docs/INCIDENT_POSTMORTEM.md INC-001).

services:
  # --- Application instances ---
  app-1:
    build: .
    container_name: urlpulse-app-1
    restart: always
    env_file: .env
    environment:
      - INSTANCE_ID=app-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  app-2:
    build: .
    container_name: urlpulse-app-2
    restart: always
    env_file: .env
    environment:
      - INSTANCE_ID=app-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  app-3:
    build: .
    container_name: urlpulse-app-3
    restart: always
    env_file: .env
    environment:
      - INSTANCE_ID=app-3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Load Balancer ---
  nginx:
    image: nginx:alpine
    container_name: urlpulse-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2
      - app-3

  # --- Observability ---
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: urlpulse-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheusdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - app-1
      - app-2
      - app-3
      - alertmanager

  grafana:
    image: grafana/grafana:11.1.4
    container_name: urlpulse-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:?set GRAFANA_ADMIN_USER in .env}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env}
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: urlpulse-alertmanager
    restart: always
    ports:
      - "9093:9093"
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:?set DISCORD_WEBHOOK_URL in .env}
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--config.expand-env"

  # --- Database ---
  postgres:
    image: postgres:16
    container_name: urlpulse-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hackathon_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Cache ---
  redis:
    image: redis:7-alpine
    container_name: urlpulse-redis
    restart: always
    # WHY these flags: appendonly for durability across restarts,
    # maxmemory 256mb caps memory usage, allkeys-lru evicts old keys
    # instead of crashing (docs/INCIDENT_POSTMORTEM.md INC-001).
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  prometheusdata:
  grafanadata:
